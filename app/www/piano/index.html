<!DOCTYPE html>
<!--
  ============================================================
  SPROUTPLAY — Piano Play Mini-App
  ============================================================
-->
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="color-scheme" content="light dark">
    <meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width, height=device-height, target-densitydpi=device-dpi" />

    <link rel="stylesheet" href="../css/base.css" type="text/css" media="screen">
    <link rel="stylesheet" href="../css/piano.css" type="text/css" media="screen">

    <title>SproutPlay - Piano Play</title>
</head>
<body>
    <div class="app-container">

        <!-- ── Header ── -->
        <header class="piano-header">
            <button id="piano-back" class="back-button" aria-label="Back to hub">← Back</button>
            <h1 class="piano-title">🎹 Piano Play</h1>
        </header>

        <!-- ── Piano keyboard ── -->
        <div id="piano-keyboard" class="piano-keyboard">
            <!-- Keys rendered by JS -->
        </div>

        <!-- ── Portrait warning ── -->
        <div id="portrait-warning" class="portrait-warning">
            <div class="portrait-warning-content">
                <div class="portrait-emoji">📱</div>
                <p>Rotate your device to play!</p>
            </div>
        </div>

    </div><!-- /.app-container -->

    <!--
      Script load order matters:
        1. sound.js       — shared Sound module
        2. mini-app-back  — Android hardware back button → hub
        3. piano.js       — piano logic (runs last)
    -->
    <script src="../js/sound.js"></script>
    <script src="../js/mini-app-back.js"></script>
    <script src="../js/piano/piano.js"></script>

</body>
</html>
