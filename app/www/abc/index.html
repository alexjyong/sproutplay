<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="color-scheme" content="light dark">
    <meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width, height=device-height, target-densitydpi=device-dpi" />
    <link rel="stylesheet" href="../css/base.css" type="text/css" media="screen">
    <link rel="stylesheet" href="../css/abc.css" type="text/css" media="screen">
    <title>SproutPlay - ABC!</title>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="abc-header">
            <button id="abc-back" class="back-button" aria-label="Back to hub">← Back</button>
            <h1 class="abc-title">ABC</h1>
        </header>

        <!-- Word Building Area -->
        <div class="word-area">
            <div id="word-slots" class="word-slots">
                <!-- Slots injected by JS -->
            </div>
        </div>

        <!-- Scattered Letters Area -->
        <div id="letter-area" class="letter-area">
            <!-- Scattered letter tiles injected by JS -->
        </div>

        <!-- Celebration Overlay -->
        <div id="celebration" class="celebration-overlay" style="display:none">
            <div class="celebration-card">
                <div class="celebration-emoji">🎉</div>
                <h2 id="celebration-word">CAT!</h2>
                <p id="celebration-meaning">A furry animal that says meow! 🐱</p>
                <button id="play-again-btn" class="play-again-button">Next Word ✨</button>
                <button id="celebration-back" class="play-again-button secondary">Back to Hub</button>
            </div>
        </div>
    </div>

    <script src="../js/sound.js"></script>
    <script src="../js/mini-app-back.js"></script>
    <script src="../js/abc/abc.js"></script>
</body>
</html>
